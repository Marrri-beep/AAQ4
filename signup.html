<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healthy Palette Form</title>
</head>

<body>

<h1>The Healthy Palette Form!</h1>

<form onsubmit="return validateForm()">

<label>What type of healthy meals do you like?</label><br>
<select id="meal">
<option value="">CHOOSE..</option>
<option value="low">Low-Calorie Meals</option>
<option value="hi">High-Protein Meals</option>
<option value="bal">Balanced Diet Meals</option>
</select>
<span id="mealErr"></span>

<br><br>

<label>Which healthy food habits would you do to improve?</label><br>
<input type="checkbox" name="fh" value="mor"> Eat More Vegetables<br>
<input type="checkbox" name="fh" value="less"> Eat Less Sweets<br>
<input type="checkbox" name="fh" value="hom"> Cook at Home<br>
<span id="habitErr"></span>

<br>

<label>How often do you eat healthy meals?</label><br>
<input type="radio" name="eat" value="daily"> Daily<br>
<input type="radio" name="eat" value="som"> A Few Times<br>
<input type="radio" name="eat" value="rarely"> Rarely<br>
<span id="freqErr"></span>

<br>

<button type="submit">GET HEALTHY!! STAY HEALTHY!!</button>

</form>

<br>

<a href="https://marrri-beep.github.io/The-Healthy-Palette/">
The Healthy Palette's Website!
</a>

<span id="message"></span>

<script src="script.js"></script>

</body>

<style>
body {
background-color: rgb(194, 238, 189);
font-family: Arial, sans-serif;
}

input, select {
padding: 8px;
border-radius: 10px;
border: 2px solid rgb(119, 217, 108);
margin-top: 5px;
}

button {
background-color: rgb(104, 190, 94);
color: white;
border: none;
padding: 10px 20px;
border-radius: 15px;
cursor: pointer;
}

button:hover {
background-color: rgb(31, 116, 24);
}

span {
color: red;
font-size: 12px;
display: block;
}

a {
color: black;
}

a:hover {
color: rgb(31, 116, 24);
}
</style>

</html>
